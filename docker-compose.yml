services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  backend-1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: &backend-env
      PORT: 3001
      PORT_RANGE_SIZE: 1
      DATABASE_URL: postgres://chat:chat@postgres:5432/chatdb
      ZOOKEEPER_HOST: zookeeper:2181
      NODE_ID: backend-1
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost:3000
      DEV_TLS_ENABLED: "false"
      TLS_ENABLED: "false"
      COOKIE_SECURE: "false"
      DEV_ZOOKEEPER_ACL_ENABLED: "true"
      ZOOKEEPER_AUTH: chat:dev-secret
      ZOOKEEPER_ACL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_started

  backend-2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-env
      NODE_ID: backend-2
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      DEV_TLS_ENABLED: "false"
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_API_URL: http://localhost:3000
      GATEWAY_TARGETS: backend-1:3001,backend-2:3001
      GATEWAY_TARGET_PROTOCOL: http
      GATEWAY_TARGET_REJECT_UNAUTHORIZED: "true"
    ports:
      - "5173:5173"
      - "3000:3000"
    depends_on:
      - backend-1
      - backend-2

volumes:
  postgres_data:
