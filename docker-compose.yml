services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  db-setup:
    image: chat-distribuido-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: &backend-env
      PORT: 3001
      PORT_RANGE_SIZE: 1
      DATABASE_URL: postgres://chat:chat@postgres:5432/chatdb
      ZOOKEEPER_HOST: zookeeper:2181
      NODE_ID: backend-1
      NODE_HOST: backend-1
      FRONTEND_ORIGINS: https://localhost:5173,https://localhost:3000,http://localhost:5173,http://localhost:3000
      DEV_TLS_ENABLED: "true"
      TLS_ENABLED: "true"
      TLS_CERT_PATH: /app/infra/certs/localhost-cert.pem
      TLS_KEY_PATH: /app/infra/certs/localhost-key.pem
      COOKIE_SECURE: "true"
      INTERNAL_TLS_REJECT_UNAUTHORIZED: "false"
      DEV_ZOOKEEPER_ACL_ENABLED: "true"
      ZOOKEEPER_AUTH: chat:dev-secret
      ZOOKEEPER_ACL_ENABLED: "true"
      RUN_DB_SETUP: "true"
      RUN_SERVER: "false"
    volumes:
      - ./infra/certs:/app/infra/certs
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_started

  backend-1:
    image: chat-distribuido-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-env
      RUN_DB_SETUP: "false"
      RUN_SERVER: "true"
    volumes:
      - ./infra/certs:/app/infra/certs
    depends_on:
      db-setup:
        condition: service_completed_successfully

  backend-2:
    image: chat-distribuido-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-env
      NODE_ID: backend-2
      NODE_HOST: backend-2
      RUN_DB_SETUP: "false"
      RUN_SERVER: "true"
    volumes:
      - ./infra/certs:/app/infra/certs
    depends_on:
      db-setup:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      DEV_TLS_ENABLED: "true"
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_API_URL: https://localhost:3000
      GATEWAY_TARGETS: backend-1:3001,backend-2:3001
      GATEWAY_TARGET_PROTOCOL: https
      GATEWAY_TARGET_REJECT_UNAUTHORIZED: "false"
      GATEWAY_ALLOWED_ORIGINS: https://localhost:5173,http://localhost:5173
    volumes:
      - ./infra/certs:/app/infra/certs
    ports:
      - "5173:5173"
      - "3000:3000"
    depends_on:
      - backend-1
      - backend-2

volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_log:
